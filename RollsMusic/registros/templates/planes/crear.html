<h1>Crear Plan de Cobro</h1>
<a href="{% url 'listar_planes' %}">⬅️ Cancelar y volver</a>
<form method="POST">
    {% csrf_token %}
    <select name="nombre">
        <option value="Free">Free</option>
        <option value="Premium">Premium</option>
    </select><br>
    <input type="number" step="0.01" name="precio" placeholder="Precio (0.00)" required><br>
    <input type="number" name="duracionDias" placeholder="Días de duración" required><br>
    <button type="submit">Guardar</button>
</form>
