<h1>Modificar Plan</h1>
<a href="{% url 'listar_planes' %}">⬅️ Cancelar y volver</a>
<form method="POST">
    {% csrf_token %}
    <select name="nombre">
        <option value="Free" {% if item.nombre == 'Free' %}selected{% endif %}>Free</option>
        <option value="Premium" {% if item.nombre == 'Premium' %}selected{% endif %}>Premium</option>
    </select><br>
    
    <input type="number" step="0.01" name="precio" value="{{ item.precio }}" required><br>
    <input type="number" name="duracionDias" value="{{ item.duracionDias }}" required><br>
    
    <button type="submit">Actualizar</button>
</form>
