{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - RollsMusic</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        :root { --rm-bg: #111111; --rm-surface: #1E1E1E; --rm-accent: #00AEEF; --rm-text-primary: #FFFFFF; --rm-text-secondary: #CCCCCC; }
        body { background-color: var(--rm-bg); color: var(--rm-text-primary); font-family: 'Segoe UI', Roboto, sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .text-muted { color: var(--rm-text-secondary) !important; }
        .login-card { background-color: var(--rm-surface); border: 1px solid #333; border-radius: 8px; padding: 40px; width: 100%; max-width: 420px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .logo-img { max-width: 150px; height: auto; margin-bottom: 15px; display: block; margin-left: auto; margin-right: auto; }
        .form-label { color: var(--rm-text-primary); font-weight: 600; font-size: 0.95rem; margin-bottom: 8px; }
        .rm-input { background-color: transparent; border: 2px solid #444; color: var(--rm-text-primary); border-radius: 4px; padding: 12px; transition: border-color 0.2s; }
        .rm-input:focus { background-color: transparent; border-color: var(--rm-accent); color: var(--rm-text-primary); box-shadow: none; outline: none; }
        .btn-rm-primary { background-color: var(--rm-accent); color: #fff; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; border-radius: 4px; padding: 14px; border: none; width: 100%; transition: background-color 0.2s; }
        .btn-rm-primary:hover { background-color: #008cc2; color: #fff; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="mb-4">
            <img src="{% static 'images/RollsMusic.png' %}" alt="RollsMusic Logo" class="logo-img">
            <h3 class="fw-bold text-center">Bienvenido</h3>
            <p class="text-center text-muted">Ingresa tus credenciales para continuar</p>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger bg-danger text-white border-0 d-flex align-items-center mb-4" role="alert">
                    <i class="bi bi-exclamation-octagon-fill me-2"></i>
                    <div>{{ message }}</div>
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="mb-3">
                <label for="correo" class="form-label">Correo Electrónico</label>
                <input type="email" name="correo" id="correo" class="form-control rm-input" required>
            </div>
            <div class="mb-4">
                <label for="contrasenia" class="form-label">Contraseña</label>
                <input type="password" name="contrasenia" id="contrasenia" class="form-control rm-input" required>
            </div>
            <button type="submit" class="btn btn-rm-primary">Iniciar Sesión</button>
        </form>

        <div class="text-center mt-4 pt-3 border-top border-secondary">
            <span class="text-muted">¿No tienes cuenta? </span>
            <a href="{% url 'registro' %}" class="fw-bold" style="color: var(--rm-accent); text-decoration: none;">Regístrate aquí</a>
        </div>
    </div>
</body>
</html>
