{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Canción - RollsMusic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        :root { --rm-bg: #111111; --rm-surface: #1E1E1E; --rm-accent: #00AEEF; --rm-text-primary: #FFFFFF; --rm-text-secondary: #CCCCCC; }
        body { background-color: var(--rm-bg); color: var(--rm-text-primary); font-family: 'Segoe UI', sans-serif; padding-bottom: 50px; }
        .navbar-rm { background-color: var(--rm-surface); padding: 15px 30px; border-bottom: 1px solid #333; }
        .admin-card { background-color: var(--rm-surface); border-radius: 8px; border: 1px solid #333; padding: 30px; margin-top: 20px; }
        
        .form-control, .form-select { background-color: #252525; border: 1px solid #444; color: #fff; }
        .form-control:focus, .form-select:focus { background-color: #2a2a2a; border-color: var(--rm-accent); color: #fff; box-shadow: 0 0 0 0.25px rgba(0, 174, 239, 0.25); }
        .form-label { color: var(--rm-text-secondary); font-weight: 600; font-size: 0.9rem; }
        
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
        .btn-volver { color: #E0E0E0; font-weight: 600; transition: color 0.2s; }
        .btn-volver:hover { color: var(--rm-accent); }

        .btn-rm-accent { background-color: var(--rm-accent); color: #000; font-weight: 700; border: none; }
        .btn-rm-accent:hover { background-color: #009cd4; color: #000; }
    </style>
</head>
<body>
    <nav class="navbar navbar-rm d-flex justify-content-between align-items-center">
        <a href="{% url 'index' %}" class="text-decoration-none d-flex align-items-center gap-2">
            <img src="{% static 'images/Logo.png' %}" alt="Icono RollsMusic" style="max-height: 45px; width: auto;">
            <span class="fs-4 fw-bold text-white mb-0">RollsMusic</span>
        </a>
    </nav>

    <div class="container mt-5" style="max-width: 650px;">
        <a href="{% url 'listar_canciones' %}" class="text-decoration-none btn-volver d-inline-flex align-items-center mb-3">
            <i class="bi bi-arrow-left-short fs-4 text-info"></i> Cancelar y volver
        </a>
        
        <div class="admin-card">
            <div class="d-flex align-items-center mb-4">
                <i class="bi bi-pencil-square fs-2 me-3 text-info"></i>
                <div>
                    <h3 class="fw-bold mb-0 text-white">Editar Registro de Canción</h3>
                    <p class="fw-semibold mb-0" style="font-size: 0.85rem; color: var(--rm-text-secondary);">Modifica las propiedades o asignación del track.</p>
                </div>
            </div>

            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="titulo" class="form-label">Nombre del track</label>
                    <input type="text" id="titulo" name="titulo" class="form-control" value="{{ item.titulo }}" required>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="duracion" class="form-label">Duración en segundos</label>
                        <input type="number" id="duracion" name="duracion" class="form-control" value="{{ item.duracion }}" required>
                    </div>
                    <div class="col-md-6">
                        <label for="numeroPista" class="form-label">Número de pista</label>
                        <input type="number" id="numeroPista" name="numeroPista" class="form-control" value="{{ item.numeroPista }}" required>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="fechaLanzamiento" class="form-label">Fecha de Lanzamiento</label>
                        <input type="date" id="fechaLanzamiento" name="fechaLanzamiento" class="form-control" value="{{ item.fechaLanzamiento|date:'Y-m-d' }}" required>
                    </div>
                    <div class="col-md-6">
                        <label for="calidadAudio" class="form-label">Calidad de Audio</label>
                        <select name="calidadAudio" id="calidadAudio" class="form-select">
                            <option value="Alta" {% if item.calidadAudio == 'Alta' %}selected{% endif %}>Alta</option>
                            <option value="Media" {% if item.calidadAudio == 'Media' %}selected{% endif %}>Media</option>
                            <option value="Baja" {% if item.calidadAudio == 'Baja' %}selected{% endif %}>Baja</option>
                        </select>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="album" class="form-label">Álbum</label>
                    <select name="album" id="album" class="form-select">
                        {% for al in albumes %}
                            <option value="{{ al.idAlbum }}" {% if al.idAlbum == item.Album_idAlbum.idAlbum %}selected{% endif %}>{{ al.titulo }}</option>
                        {% endfor %}
                    </select>
                </div>

                <button type="submit" class="btn btn-rm-accent w-100 py-2.5 rounded text-uppercase tracking-wider">
                    <i class="bi bi-arrow-clockwise me-2"></i> Actualizar Registro
                </button>
            </form>
        </div>
    </div>
</body>
</html>
