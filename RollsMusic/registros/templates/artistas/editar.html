<h1>Editar Artista</h1>
<a href="{% url 'listar_artistas' %}">⬅️ Cancelar y volver</a>
<br><br>
<form method="POST">
    {% csrf_token %}
    
    <div class="form-group">
        <label>Usuario Asociado:</label>
        <input type="text" class="form-control" value="{{ item.Usuario_idUsuario.nombre }} {{ item.Usuario_idUsuario.apellido }}" readonly>
    </div>

    <div class="form-group">
        <label for="nombreArtistico">Nombre Artístico:</label>
        <input type="text" name="nombreArtistico" id="nombreArtistico" class="form-control" value="{{ item.nombreArtistico }}" required>
    </div>

    <div class="form-group">
        <label for="generoPrincipal">Género Principal:</label>
        <input type="text" name="generoPrincipal" id="generoPrincipal" class="form-control" value="{{ item.generoPrincipal }}" required>
    </div>

    <div class="form-group">
        <label for="biografia">Biografía:</label>
        <textarea name="biografia" id="biografia" class="form-control">{{ item.biografia }}</textarea>
    </div>

    <div class="form-check mb-3">
        <input type="checkbox" name="verificado" id="verificado" class="form-check-input" {% if item.verificado %}checked{% endif %}>
        <label class="form-check-label" for="verificado">Artista Verificado</label>
    </div>

    <div class="form-group">
        <label for="discografica">Discográfica:</label>
        <select name="discografica" id="discografica" class="form-control" required>
            {% for disco in discograficas %}
                <option value="{{ disco.idDiscografica }}" {% if disco.idDiscografica == item.Discografica_idDiscografica.idDiscografica %}selected{% endif %}>
                    {{ disco.nombre }}
                </option>
            {% endfor %}
        </select>
    </div>

    <button type="submit" class="btn btn-success">Guardar Cambios</button>
</form>
